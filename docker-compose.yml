services:
  tor-proxy:
    image: dperson/torproxy:latest
    restart: unless-stopped
    environment:
      - LOCATION=IT
      - TZ=Europe/Rome
      - PASSWORD=tor-heardle-ctl-2026
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 10 --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip | grep -q '\"IsTor\":true'"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3

  dbupdater:
    build: .
    environment:
      - YTMUSIC_
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - TOR_CONTROL_HOST=tor-proxy
      - TOR_CONTROL_PORT=9051
      - TOR_CONTROL_PASSWORD=tor-heardle-ctl-2026
    depends_on:
      tor-proxy:
        condition: service_healthy
    networks: [internal]
    volumes:
      - ./ArtistiRevisionati:/app/ArtistiRevisionati
      - ./ArtistiSongSent:/app/ArtistiSongSent

networks:
  internal:
    driver: bridge
